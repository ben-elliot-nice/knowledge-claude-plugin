name: Check version bump

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Verify version was bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main for comparison
        run: git fetch origin main

      - name: Check version bump
        run: |
          set -e

          CHANGED=$(git diff --name-only origin/main...HEAD)

          SOURCE_CHANGED=$(echo "$CHANGED" | grep -E \
            '^(skills/|\.claude-plugin/plugin\.json)' \
            || true)

          if [ -z "$SOURCE_CHANGED" ]; then
            echo "No source or skill changes detected — version bump not required."
            exit 0
          fi

          echo "Source changes detected:"
          echo "$SOURCE_CHANGED"
          echo ""

          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          MAIN=$(git show origin/main:.claude-plugin/plugin.json | jq -r '.version')

          echo "main:    $MAIN"
          echo "current: $CURRENT"

          if [ "$CURRENT" = "$MAIN" ]; then
            echo "::error::Version not bumped. Bump .claude-plugin/plugin.json before merging."
            exit 1
          fi

          echo "Version bump verified: $MAIN → $CURRENT ✓"
